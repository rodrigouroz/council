name: Package Council Skill

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill/council/scripts
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: skill/council/scripts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check bundled helper drift
        run: npm run check-dist

      - name: Package skill zip
        run: npm run package

      - name: Upload skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: council-skill
          path: skill/council/dist/council-skill.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download skill artifact
        uses: actions/download-artifact@v4
        with:
          name: council-skill
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/council-skill.zip
